name: publish
on:
  push:
    branches:
      - "main"
  pull_request:

concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'ci-main' || format('ci-{0}-{1}', github.ref, github.run_id) }}
  cancel-in-progress: false

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  NUGET_DIRECTORY: ${{ github.workspace}}/artifacts

defaults:
  run:
    shell: pwsh

jobs:
  lint_config:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
      - run: dotnet run --project=tools/ConfigFilesGenerator/ConfigFilesGenerator.csproj
      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet
          if ($LASTEXITCODE -eq 0) {
            echo "has_changes=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          if ($LASTEXITCODE -eq 1) {
            echo "has_changes=true" >> $env:GITHUB_OUTPUT
            exit 0
          }

          Write-Error "git diff failed with exit code $LASTEXITCODE"
          exit $LASTEXITCODE
      - name: Fail if there are changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          Write-Host "Configuration files are not up to date. Please run the ConfigFilesGenerator tool and commit the changes."
          exit 1

  compute_version:
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.compute-version.outputs.package_version }}
    steps:
        - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        - id: compute-version
          run: |
            try
            {
                $(Invoke-WebRequest "https://www.nuget.org/api/v2/package/Meziantou.NET.Sdk/").BaseResponse.RequestMessage.RequestUri -match "meziantou\.net\.sdk\.1\.0\.([0-9]+).nupkg"
                $NewVersion = "1.0.$([int]$Matches.1 + 1)"
            }
            catch
            {
                $NewVersion = "1.0.0"
            }

            Write-Host "New version: $NewVersion"
            "package_version=$NewVersion" >> $env:GITHUB_OUTPUT

  create_nuget:
    needs: [compute_version]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
      - run: ./build.ps1 "-p:Version=${{ needs.compute_version.outputs.package_version }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: nuget
          if-no-files-found: error
          retention-days: 3
          path: "${{ env.NUGET_DIRECTORY }}/*.nupkg"

  test:
    strategy:
      fail-fast: false
      matrix:
        runs-on: [ubuntu-latest, windows-latest, macos-latest]
        shard-index: [1, 2, 3, 4]
    runs-on: ${{ matrix.runs-on }}
    needs: [create_nuget, compute_version]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: nuget
          path: ${{ env.NUGET_DIRECTORY }}
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
      - run: Get-ChildItem "${{ env.NUGET_DIRECTORY }}/*" -Recurse
      - run: dotnet --info
      - run: dotnet tool install --global Meziantou.ShardedTest
      - run: sharded-test --shard-index ${{ matrix.shard-index }} --total-shards 4 tests/Meziantou.Sdk.Tests --logger "trx" --results-directory test_results --settings .github/sharded-tests.runsettings
        env:
            NUGET_DIRECTORY: ${{ env.NUGET_DIRECTORY }}
            PACKAGE_VERSION: ${{ needs.compute_version.outputs.package_version }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: test_results_${{ matrix.runs-on }}_${{ matrix.shard-index }}
          path: test_results

  deploy:
    runs-on: ubuntu-latest
    needs: [create_nuget, lint_config, test, compute_version]
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: nuget
          path: ${{ env.NUGET_DIRECTORY }}
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: login
        with:
          user: meziantou
      - name: Must Publish Packages
        id: has_changes
        run: |
          $PreviousTag = git describe --tags --abbrev=0 2>$null
          if ($PreviousTag) {
            Write-Host "Previous tag: $PreviousTag"
            $Changes = git diff --name-only $PreviousTag HEAD -- '*.nuspec' 'src/**/*'
          } else {
            Write-Host "No previous tag found, checking all files"
            $Changes = $true
          }

          if ($Changes) {
            Write-Host "Changes: $Changes"
            echo "has_changes=true" >> $env:GITHUB_OUTPUT
            exit 0
          } else {
            Write-Host "No changes detected in .nuspec or src/ files"
            echo "has_changes=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

      - name: Publish NuGet packages
        if: ${{ steps.has_changes.outputs.has_changes == 'true' }}
        env:
          NuGetApiKey: ${{steps.login.outputs.NUGET_API_KEY}}
          FeedzApiKey: ${{ secrets.FEEDZ_APIKEY }}
        run: |
          Write-Host "Current ref: $env:GITHUB_REF"
          Write-Host "Searching nupkg in folder: ${{ env.NUGET_DIRECTORY }}"
          $files = Get-ChildItem "${{ env.NUGET_DIRECTORY }}/*" -Recurse -Include *.nupkg
          foreach ($file in $files) {
              Write-Host "Pushing NuGet package: $($file.FullName)"
              & dotnet nuget push "$($file.FullName)" --api-key "$env:FeedzApiKey" --source https://f.feedz.io/meziantou/meziantou-dotnet-codingstandard/nuget/index.json --force-english-output --skip-duplicate
              if ($env:GITHUB_REF -eq 'refs/heads/main')
              {
                  & dotnet nuget push "$($file.FullName)" --api-key "$env:NuGetApiKey" --source https://api.nuget.org/v3/index.json --force-english-output --skip-duplicate
              }
          }

      - run: gh release create "${{ needs.compute_version.outputs.package_version }}" --generate-notes
        if: ${{ steps.has_changes.outputs.has_changes == 'true' && github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ github.token }}

  final_status_check:
    runs-on: ubuntu-latest
    if: always()
    needs: [lint_config, compute_version, create_nuget, test, deploy]
    steps:
      - name: Check previous jobs status
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          $needs = $env:NEEDS_JSON | ConvertFrom-Json -AsHashtable
          $failedJobs = @(
            $needs.GetEnumerator()
            | Where-Object { $_.Value.result -notin @('success', 'skipped') }
          )

          if ($failedJobs.Count -eq 0) {
            Write-Host "All dependency jobs succeeded or were skipped."
            exit 0
          }

          $failedJobNames = $failedJobs.Name | Sort-Object
          Write-Host "::error::Some jobs did not succeed: $($failedJobNames -join ', ')"
          exit 1
